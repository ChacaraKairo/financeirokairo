name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'
      - name: Ruff
        run: ruff check src tests
      - name: Tests
        run: pytest --cov=financeiro_kairo --cov-report=term-missing

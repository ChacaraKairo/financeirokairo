name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'
      - name: Generate Ruff report
        run: |
          ruff check src tests migrations --output-format=concise > ruff-report.txt || true
          ruff check src tests migrations --fix --diff > ruff-fix.diff || true
      - name: Upload Ruff report
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: |
            ruff-report.txt
            ruff-fix.diff
      - name: Ruff
        run: ruff check src tests migrations
      - name: Generate test report
        run: pytest --cov=financeiro_kairo --cov-report=term-missing -vv > pytest-report.txt 2>&1 || true
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.txt
      - name: Tests
        run: pytest --cov=financeiro_kairo --cov-report=term-missing
